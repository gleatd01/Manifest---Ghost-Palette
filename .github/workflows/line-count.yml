name: Update Line Count

on:
  workflow_dispatch: # Enables the manual "Run workflow" button in GitHub

permissions:
  contents: write

jobs:
  count-lines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc

      - name: Generate Line Count Report
        run: |
          echo "# Repository Line Count" > line_count.md
          echo "Generated on: $(date)" >> line_count.md
          echo "" >> line_count.md
          echo "\`\`\`text" >> line_count.md
          cloc . --exclude-dir=.git >> line_count.md
          echo "\`\`\`" >> line_count.md

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add line_count.md
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update line_count.md"
            git push
          else
            echo "No changes to line count."
          fi
