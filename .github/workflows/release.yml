name: Automated Build and Release

on:
  push:
    branches:
      - main  # Target branch
    paths-ignore:
      - '.github/**'
      - 'build/**'
      - 'line_count.md'
      - 'build_manifest.py'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to push updated files and create releases

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 6. Generate a dynamic version tag using YYYYMMDD-HHMM format
      - name: Generate Tag Name
        id: tag_name
        run: |
          # Generates time in YYYYMMDD-HHMM format in explicit UTC (e.g., 20260702-1630)
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M')
          echo "TAG=$TIMESTAMP" >> $GITHUB_ENV

      # 7. Package the workspace into a custom release ZIP (using the timestamp name)
      - name: Create Clean Release ZIP
        run: |
          # Zip everything, but explicitly exclude the requested files and directories
          # Note: We use ${{ env.TAG }}.zip to dynamically name the output file
          zip -r "${{ env.TAG }}.zip" . -x ".github/*" "build/*" "line_count.md" "build_manifest.py" "${{ env.TAG }}.zip"

      # 8. Create a GitHub Release and attach the custom ZIP
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          body: |
            ## 📦 Production Download
            Please download **`${{ env.TAG }}.zip`** below for the clean, production-ready version.
            
            *(Note: Avoid downloading the automatic "Source Code" links below, as they contain development and internal configuration files).*
          draft: false
          prerelease: false
          files: |
            ${{ env.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Build and Push Docker Image with compiled-in version tag
      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg GITHUB_REF_NAME="${{ env.TAG }}" \
            -t your-docker-registry/manifest-app:latest .

