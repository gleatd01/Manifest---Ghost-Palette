name: Automated Build and Release

on:
  push:
    branches:
      - main  # Target branch
    paths-ignore:
      - '.github/**'
      - 'build/**'
      - 'line_count.md'
      - 'build_manifest.py'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to push updated files and create releases

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run your manifest builder script
      - name: Run build_manifest.py
        run: python build_manifest.py

      # 5. Commit any changes made by build_manifest.py back to the repository
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are modified or untracked files
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: auto-update manifest artifacts [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      # 6. Generate a dynamic version tag using YYYYMMDD-HHMM format
      - name: Generate Tag Name
        id: tag_name
        run: |
          # Generates time in YYYYMMDD-HHMM format (e.g., 20260702-1145)
          TIMESTAMP=$(date +'%Y%m%d-%H%M')
          echo "TAG=$TIMESTAMP" >> $GITHUB_ENV

      # 7. Package the workspace into a custom release ZIP (using the timestamp name)
      - name: Create Clean Release ZIP
        run: |
          # Zip everything, but explicitly exclude the requested files and directories
          # Note: We use ${{ env.TAG }}.zip to dynamically name the output file
          zip -r "${{ env.TAG }}.zip" . -x ".github/*" "build/*" "line_count.md" "build_manifest.py" "${{ env.TAG }}.zip"

      # 8. Create a GitHub Release and attach the custom ZIP
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          body: |
            ## 📦 Production Download
            Please download **`${{ env.TAG }}.zip`** below for the clean, production-ready version.
            
            *(Note: Avoid downloading the automatic "Source Code" links below, as they contain development and internal configuration files).*
          draft: false
          prerelease: false
          files: |
            ${{ env.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}